name: image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/vzekc/exhibitron

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-exhibitron-prod
      cancel-in-progress: false
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Write kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_EXHIBITRON_DEPLOY }}
        run: |
          printf '%s' "$KUBECONFIG_DATA" > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Rollout restart + wait
        env:
          NAMESPACE: prod
          DEPLOYMENT: exhibitron
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout restart "deployment/$DEPLOYMENT"
          kubectl -n "$NAMESPACE" rollout status  "deployment/$DEPLOYMENT" --timeout=5m
